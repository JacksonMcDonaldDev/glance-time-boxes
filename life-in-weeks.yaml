- name: Life
  slug: life-in-weeks # URL will be /life-in-weeks
  columns:
    - size: full
      widgets:
        - type: custom-api
          title: Life in Weeks
          body-type: string
          skip-json-validation: true
          cache: 1h
          template: |
            {{ $t := now }}
            {{/* Set your birthday as the second date below in YYYY-MM-DD format. Ignore the first date as it is a necessary reference for Go.*/}}
            {{ $bday := parseTime "2006-01-02" "1990-12-22" }}
            {{ $fullYears := sub $t.Year $bday.Year }}
            {{ $daysSinceLastBday := sub $t.YearDay $bday.YearDay }}
            {{ if lt $t.YearDay $bday.YearDay }}
              {{ $fullYears = sub $fullYears 1 }}
              {{ $daysSinceLastBday = add (sub 365 $bday.YearDay) $t.YearDay }}
            {{ end }}
            {{ $weeksLived := add (mul $fullYears 52) (div $daysSinceLastBday 7) }}
            {{ $totalWeeks := 4732 }}

            <div style="font-family: sans-serif; text-align: center;">
              <div style="display: inline-flex; flex-direction: column; gap: 1px;">
                {{ range $age := toInt 91 }}
                  <div style="display: flex; align-items: center;">
                    <div style="width: 20px; height: 14px; font-size: 9px; line-height: 14px; text-align: right; padding-right: 3px; opacity: 0.4; flex-shrink: 0;">
                      {{ if eq (mod $age 5) 0 }}{{ $age }}{{ end }}
                    </div>
                    <div style="display: flex; gap: 1px;">
                      {{ range $week := toInt 52 }}
                        {{ $absWeek := add (mul $age 52) $week }}
                        {{ if lt $absWeek $weeksLived }}
                          <div style="width: 14px; height: 14px; border-radius: 2px; background: #70a1ff;"></div>
                        {{ else if eq $absWeek $weeksLived }}
                          <div style="width: 14px; height: 14px; border-radius: 2px; background: #70a1ff; opacity: 0.5;"></div>
                        {{ else }}
                          <div style="width: 14px; height: 14px; border-radius: 2px; box-shadow: inset 0 0 0 1px rgba(112,161,255,0.3);"></div>
                        {{ end }}
                      {{ end }}
                    </div>
                  </div>
                {{ end }}
              </div>
              <div class="size-h3" style="margin-top: 8px; opacity: 0.7;">{{ $weeksLived }} / {{ $totalWeeks }}</div>
            </div>
