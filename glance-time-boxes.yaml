- type: group
  widgets:
    - type: custom-api
      title: Week
      body-type: string
      skip-json-validation: true
      cache: 1h
      template: |
        {{ $t := now }}
        {{/* Map Weekday to Monday=0..Sunday=6 */}}
        {{ $dow := 0 }}
        {{ if eq $t.Weekday 0 }}{{ $dow = 6 }}
        {{ else if eq $t.Weekday 1 }}{{ $dow = 0 }}
        {{ else if eq $t.Weekday 2 }}{{ $dow = 1 }}
        {{ else if eq $t.Weekday 3 }}{{ $dow = 2 }}
        {{ else if eq $t.Weekday 4 }}{{ $dow = 3 }}
        {{ else if eq $t.Weekday 5 }}{{ $dow = 4 }}
        {{ else if eq $t.Weekday 6 }}{{ $dow = 5 }}
        {{ end }}

        <div style="font-family: sans-serif; text-align: center;">
          <div style="display: flex; gap: 6px; justify-content: center;">
            {{ range $i := toInt 7 }}
              {{ if lt $i $dow }}
                <div style="width: 24px; height: 24px; border-radius: 4px; background: #70a1ff;"></div>
              {{ else if eq $i $dow }}
                <div style="width: 24px; height: 24px; border-radius: 4px; background: #70a1ff; opacity: 0.5;"></div>
              {{ else }}
                <div style="width: 24px; height: 24px; border-radius: 4px; box-shadow: inset 0 0 0 2px rgba(112,161,255,0.3);"></div>
              {{ end }}
            {{ end }}
          </div>
          <div style="display: flex; gap: 6px; justify-content: center; margin-top: 4px;">
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">M</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">T</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">W</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">T</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">F</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">S</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">S</div>
          </div>
          <div class="size-h3" style="margin-top: 8px; opacity: 0.7;">{{ add $dow 1 }} / 7</div>
        </div>

    - type: custom-api
      title: Year (Days)
      body-type: string
      skip-json-validation: true
      cache: 1h
      template: |
        {{ $t := now }}
        {{ $dayOfYear := $t.YearDay }}
        {{ $year := $t.Year }}

        {{/* Leap year check */}}
        {{ $isLeap := false }}
        {{ if eq (mod $year 4) 0 }}{{ $isLeap = true }}{{ end }}
        {{ if eq (mod $year 100) 0 }}{{ $isLeap = false }}{{ end }}
        {{ if eq (mod $year 400) 0 }}{{ $isLeap = true }}{{ end }}
        {{ $totalDays := 365 }}
        {{ if $isLeap }}{{ $totalDays = 366 }}{{ end }}

        <div style="font-family: sans-serif; text-align: center;">
          <div style="display: inline-grid; grid-template-columns: repeat(10, 10px); gap: 2px;">
            {{ range $i := toInt 366 }}
              {{ $dayNum := add $i 1 }}
              {{ if le $dayNum $totalDays }}
                {{ if lt $dayNum $dayOfYear }}
                  <div style="width: 10px; height: 10px; border-radius: 2px; background: #70a1ff;"></div>
                {{ else if eq $dayNum $dayOfYear }}
                  <div style="width: 10px; height: 10px; border-radius: 2px; background: #70a1ff; opacity: 0.5;"></div>
                {{ else }}
                  <div style="width: 10px; height: 10px; border-radius: 2px; box-shadow: inset 0 0 0 1px rgba(112,161,255,0.3);"></div>
                {{ end }}
              {{ end }}
            {{ end }}
          </div>
          <div class="size-h3" style="margin-top: 8px; opacity: 0.7;">{{ $dayOfYear }} / {{ $totalDays }}</div>
        </div>

    - type: custom-api
      title: Life in Weeks
      body-type: string
      skip-json-validation: true
      cache: 1h
      template: |
        {{ $t := now }}
        {{/* Set your birthday as the second date below in YYYY-MM-DD format. Ignore the first date as it is a necessary reference for Go.*/}}
        {{ $bday := parseTime "2006-01-02" "1990-12-22" }}
        {{ $fullYears := sub $t.Year $bday.Year }}
        {{ $daysSinceLastBday := sub $t.YearDay $bday.YearDay }}
        {{ if lt $t.YearDay $bday.YearDay }}
          {{ $fullYears = sub $fullYears 1 }}
          {{ $daysSinceLastBday = add (sub 365 $bday.YearDay) $t.YearDay }}
        {{ end }}
        {{ $weeksLived := add (mul $fullYears 52) (div $daysSinceLastBday 7) }}
        {{ $totalWeeks := 4732 }}

        <div style="font-family: sans-serif; text-align: center;">
          <div style="display: inline-flex; flex-direction: column; gap: 1px;">
            {{ range $age := toInt 91 }}
              <div style="display: flex; align-items: center;">
                <div style="width: 20px; height: 14px; font-size: 9px; line-height: 14px; text-align: right; padding-right: 3px; opacity: 0.4; flex-shrink: 0;">
                  {{ if eq (mod $age 5) 0 }}{{ $age }}{{ end }}
                </div>
                <div style="display: flex; gap: 1px;">
                  {{ range $week := toInt 52 }}
                    {{ $absWeek := add (mul $age 52) $week }}
                    {{ if lt $absWeek $weeksLived }}
                      <div style="width: 14px; height: 14px; border-radius: 2px; background: #70a1ff;"></div>
                    {{ else if eq $absWeek $weeksLived }}
                      <div style="width: 14px; height: 14px; border-radius: 2px; background: #70a1ff; opacity: 0.5;"></div>
                    {{ else }}
                      <div style="width: 14px; height: 14px; border-radius: 2px; box-shadow: inset 0 0 0 1px rgba(112,161,255,0.3);"></div>
                    {{ end }}
                  {{ end }}
                </div>
              </div>
            {{ end }}
          </div>
          <div class="size-h3" style="margin-top: 8px; opacity: 0.7;">{{ $weeksLived }} / {{ $totalWeeks }}</div>
        </div>

    - type: custom-api
      title: Month
      body-type: string
      skip-json-validation: true
      cache: 1h
      template: |
        {{ $t := now }}
        {{ $day := $t.Day }}
        {{ $year := $t.Year }}
        {{ $month := 0 }}
        {{ if eq $t.Month 1 }}{{ $month = 1 }}
        {{ else if eq $t.Month 2 }}{{ $month = 2 }}
        {{ else if eq $t.Month 3 }}{{ $month = 3 }}
        {{ else if eq $t.Month 4 }}{{ $month = 4 }}
        {{ else if eq $t.Month 5 }}{{ $month = 5 }}
        {{ else if eq $t.Month 6 }}{{ $month = 6 }}
        {{ else if eq $t.Month 7 }}{{ $month = 7 }}
        {{ else if eq $t.Month 8 }}{{ $month = 8 }}
        {{ else if eq $t.Month 9 }}{{ $month = 9 }}
        {{ else if eq $t.Month 10 }}{{ $month = 10 }}
        {{ else if eq $t.Month 11 }}{{ $month = 11 }}
        {{ else }}{{ $month = 12 }}
        {{ end }}

        {{/* Days in current month */}}
        {{ $isLeap := false }}
        {{ if eq (mod $year 4) 0 }}{{ $isLeap = true }}{{ end }}
        {{ if eq (mod $year 100) 0 }}{{ $isLeap = false }}{{ end }}
        {{ if eq (mod $year 400) 0 }}{{ $isLeap = true }}{{ end }}
        {{ $daysInMonth := 31 }}
        {{ if or (eq $month 4) (or (eq $month 6) (or (eq $month 9) (eq $month 11))) }}{{ $daysInMonth = 30 }}{{ end }}
        {{ if eq $month 2 }}{{ if $isLeap }}{{ $daysInMonth = 29 }}{{ else }}{{ $daysInMonth = 28 }}{{ end }}{{ end }}

        <div style="font-family: sans-serif; text-align: center;">
          <div style="display: inline-grid; grid-template-columns: repeat(7, 24px); gap: 4px;">
            {{ range $i := toInt 35 }}
              {{ $di := add $i 1 }}
              {{ if le $di $daysInMonth }}
                {{ if lt $di $day }}
                  <div style="width: 24px; height: 24px; border-radius: 4px; background: #70a1ff;"></div>
                {{ else if eq $di $day }}
                  <div style="width: 24px; height: 24px; border-radius: 4px; background: #70a1ff; opacity: 0.5;"></div>
                {{ else }}
                  <div style="width: 24px; height: 24px; border-radius: 4px; box-shadow: inset 0 0 0 2px rgba(112,161,255,0.3);"></div>
                {{ end }}
              {{ end }}
            {{ end }}
          </div>
          <div class="size-h3" style="margin-top: 8px; opacity: 0.7;">{{ $day }} / {{ $daysInMonth }}</div>
        </div>
