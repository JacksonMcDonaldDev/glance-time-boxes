- type: group
  widgets:
    - type: custom-api
      title: Week
      body-type: string
      skip-json-validation: true
      cache: 1h
      template: |
        {{ $t := now }}
        {{/* Map Weekday to Monday=0..Sunday=6 */}}
        {{ $dow := 0 }}
        {{ if eq $t.Weekday 0 }}{{ $dow = 6 }}
        {{ else if eq $t.Weekday 1 }}{{ $dow = 0 }}
        {{ else if eq $t.Weekday 2 }}{{ $dow = 1 }}
        {{ else if eq $t.Weekday 3 }}{{ $dow = 2 }}
        {{ else if eq $t.Weekday 4 }}{{ $dow = 3 }}
        {{ else if eq $t.Weekday 5 }}{{ $dow = 4 }}
        {{ else if eq $t.Weekday 6 }}{{ $dow = 5 }}
        {{ end }}

        <div style="font-family: sans-serif; text-align: center;">
          <div style="display: flex; gap: 6px; justify-content: center;">
            {{ range $i := toInt 7 }}
              {{ if lt $i $dow }}
                <div style="width: 24px; height: 24px; border-radius: 4px; background: #70a1ff;"></div>
              {{ else if eq $i $dow }}
                <div style="width: 24px; height: 24px; border-radius: 4px; background: #70a1ff; opacity: 0.5;"></div>
              {{ else }}
                <div style="width: 24px; height: 24px; border-radius: 4px; box-shadow: inset 0 0 0 2px rgba(112,161,255,0.3);"></div>
              {{ end }}
            {{ end }}
          </div>
          <div style="display: flex; gap: 6px; justify-content: center; margin-top: 4px;">
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">M</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">T</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">W</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">T</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">F</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">S</div>
            <div style="width: 24px; text-align: center; font-size: 10px; opacity: 0.5;">S</div>
          </div>
          <div class="size-h3" style="margin-top: 8px; opacity: 0.7;">{{ add $dow 1 }} / 7</div>
        </div>

    - type: custom-api
      title: Year (Days)
      body-type: string
      skip-json-validation: true
      cache: 1h
      template: |
        {{ $t := now }}
        {{ $dayOfYear := $t.YearDay }}
        {{/* Map Weekday to Sunday=0..Saturday=6 as integer */}}
        {{ $wdInt := 0 }}
        {{ if eq $t.Weekday 1 }}{{ $wdInt = 1 }}
        {{ else if eq $t.Weekday 2 }}{{ $wdInt = 2 }}
        {{ else if eq $t.Weekday 3 }}{{ $wdInt = 3 }}
        {{ else if eq $t.Weekday 4 }}{{ $wdInt = 4 }}
        {{ else if eq $t.Weekday 5 }}{{ $wdInt = 5 }}
        {{ else if eq $t.Weekday 6 }}{{ $wdInt = 6 }}
        {{ end }}
        {{ $year := $t.Year }}

        {{/* Leap year check */}}
        {{ $isLeap := false }}
        {{ if eq (mod $year 4) 0 }}{{ $isLeap = true }}{{ end }}
        {{ if eq (mod $year 100) 0 }}{{ $isLeap = false }}{{ end }}
        {{ if eq (mod $year 400) 0 }}{{ $isLeap = true }}{{ end }}
        {{ $totalDays := 365 }}
        {{ if $isLeap }}{{ $totalDays = 366 }}{{ end }}

        {{/* Compute Jan 1 weekday in Monday-indexed (Mon=0..Sun=6) */}}
        {{ $daysSinceJan1 := sub $dayOfYear 1 }}
        {{ $daysMod7 := mod $daysSinceJan1 7 }}
        {{ $jan1Sun := mod (add (sub $wdInt $daysMod7) 7) 7 }}
        {{ $jan1Mon := mod (add $jan1Sun 6) 7 }}

        <div style="font-family: sans-serif; text-align: center;">
          <div style="display: inline-grid; grid-template-rows: repeat(7, 6px); grid-auto-flow: column; grid-auto-columns: 6px; gap: 2px;">
            {{ range $col := toInt 54 }}
              {{ range $row := toInt 7 }}
                {{ $ci := add (mul $col 7) $row }}
                {{ $dayNum := add (sub $ci $jan1Mon) 1 }}
                {{ if or (lt $dayNum 1) (gt $dayNum $totalDays) }}
                  <div style="width: 6px; height: 6px;"></div>
                {{ else if lt $dayNum $dayOfYear }}
                  <div style="width: 6px; height: 6px; border-radius: 1px; background: #70a1ff;"></div>
                {{ else if eq $dayNum $dayOfYear }}
                  <div style="width: 6px; height: 6px; border-radius: 1px; background: #70a1ff; opacity: 0.5;"></div>
                {{ else }}
                  <div style="width: 6px; height: 6px; border-radius: 1px; box-shadow: inset 0 0 0 1px rgba(112,161,255,0.3);"></div>
                {{ end }}
              {{ end }}
            {{ end }}
          </div>
          <div class="size-h3" style="margin-top: 8px; opacity: 0.7;">{{ $dayOfYear }} / {{ $totalDays }}</div>
        </div>

    - type: custom-api
      title: Year (Weeks)
      body-type: string
      skip-json-validation: true
      cache: 1h
      template: |
        {{ $t := now }}
        {{ $dayOfYear := $t.YearDay }}
        {{ $currentWeek := div (sub $dayOfYear 1) 7 }}

        <div style="font-family: sans-serif; text-align: center;">
          <div style="display: flex; flex-wrap: wrap; gap: 3px; justify-content: center;">
            {{ range $i := toInt 53 }}
              {{ if lt $i $currentWeek }}
                <div style="width: 8px; height: 8px; border-radius: 2px; background: #70a1ff;"></div>
              {{ else if eq $i $currentWeek }}
                <div style="width: 8px; height: 8px; border-radius: 2px; background: #70a1ff; opacity: 0.5;"></div>
              {{ else }}
                <div style="width: 8px; height: 8px; border-radius: 2px; box-shadow: inset 0 0 0 1px rgba(112,161,255,0.3);"></div>
              {{ end }}
            {{ end }}
          </div>
          <div class="size-h3" style="margin-top: 8px; opacity: 0.7;">{{ add $currentWeek 1 }} / 53</div>
        </div>
